template_version: 0.6
id: custom-1783405447806-apik56
title: Github Fork Private Repositories Setting Enabled/Cleared
description: Detects when the policy allowing forks of private and internal repositories is changed (enabled or cleared).
status: test
logsource:
  scope: unknown
level: medium
detection:
  kql_query: |-
    dataset="github_audit"
    | where action in ("private_repository_forking.clear", "private_repository_forking.enable")
references:
  - https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/audit-log-events-for-your-enterprise#private_repository_forking
author: Romain Gaillard (@romain-gaillard)
date: '2024-07-29T00:00:00.000Z'
tags:
  - sigma-import
  - github
  - audit
  - ai-translated
falsepositives: Allowed administrative activities.
matcher:
  format: sigma
  logsource:
    product: github
    service: audit
    definition: 'Requirements: The audit log streaming feature must be enabled to be able to receive such logs. You can enable following the documentation here: https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/streaming-the-audit-log-for-your-enterprise#setting-up-audit-log-streaming'
  detection:
    selection:
      action:
        - private_repository_forking.clear
        - private_repository_forking.enable
    condition: selection
