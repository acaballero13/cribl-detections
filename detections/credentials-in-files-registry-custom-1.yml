template_version: 0.6
id: custom-1781476355801-4f565j
title: Credentials in Files & Registry
description: Adversaries may search the Windows Registry on compromised systems for insecurely stored credentials for credential access. This can be accomplished using the query functionality of the reg.exe system utility, by looking for keys and values that contain strings such as "password". In addition, adversaries may use toolkits such as [PowerSploit](https://powersploit.readthedocs.io/en/latest/) in order to dump credentials from various applications such as IIS.Accordingly, this analytic looks for invocations of reg.exe in this capacity as well as that of several powersploit modules with similar functionality.
status: test
logsource:
  scope: unknown
level: medium
detection:
  kql_query: |-
    dataset="cribl_search_sample"
    | where EventCode == 1 or EventCode == 4688
    | where CommandLine has "reg" and CommandLine has "query HKLM /f password /t REG_SZ /s"
       or CommandLine has "reg" and CommandLine has "query HKCU /f password /t REG_SZ /s"
       or CommandLine has "Get-UnattendedInstallFile"
       or CommandLine has "Get-Webconfig"
       or CommandLine has "Get-ApplicationHost"
       or CommandLine has "Get-SiteListPassword"
       or CommandLine has "Get-CachedGPPPassword"
       or CommandLine has "Get-RegistryAutoLogon"
tags:
  - ai-translated
